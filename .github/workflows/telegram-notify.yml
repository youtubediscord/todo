name: Telegram Commit Notify

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send to Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Commit info
          AUTHOR="${{ github.event.head_commit.author.name }}"
          MESSAGE="${{ github.event.head_commit.message }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          URL="${{ github.event.head_commit.url }}"
          REPO="${{ github.repository }}"

          # Stats
          STATS=$(git diff --shortstat HEAD~1 HEAD 2>/dev/null || echo "no stats")
          FILES_CHANGED=$(git diff --name-status HEAD~1 HEAD 2>/dev/null || echo "")

          # Build file list
          FILE_LIST=""
          while IFS=$'\t' read -r status file; do
            [ -z "$file" ] && continue
            case "$status" in
              A*) emoji="🆕" ;;
              M*) emoji="✏️" ;;
              D*) emoji="🗑️" ;;
              R*) emoji="📝" ;;
              *)  emoji="📄" ;;
            esac
            FILE_LIST="${FILE_LIST}${emoji} <code>${file}</code>\n"
          done <<< "$FILES_CHANGED"

          # First line of commit message
          FIRST_LINE=$(echo "$MESSAGE" | head -1)

          # Build message
          TEXT="💥 <b>ВСЕ НАШИ ССЫЛКИ:</b> https://t.me/runetvpnyoutubediscord

          🔔 <b>Новый коммит в ${REPO}</b>

          📝 <b>${FIRST_LINE}</b>

          👤 Автор: ${AUTHOR}
          🔗 SHA: <code>${SHORT_SHA}</code>

          📊 <b>Статистика:</b> ${STATS}

          📁 <b>Изменённые файлы:</b>
          ${FILE_LIST}
          🔗 <a href='${URL}'>Открыть на GitHub</a>"

          # Send
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview=true \
            --data-urlencode "text=${TEXT}"
